# 构建 Docker 镜像并推送到 Docker Hub
# 触发：推送到 main 分支，或手动运行
name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 设置镜像标签
        id: meta
        run: |
          echo "version=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "image=${{ secrets.DOCKERHUB_USERNAME }}/jobsdb-autoapply" >> $GITHUB_OUTPUT

      - name: 构建并推送
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/jobsdb-autoapply:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/jobsdb-autoapply:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
